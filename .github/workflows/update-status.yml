name: Update Status JSON
on:
  push: # Triggering on push is easier for testing
    branches: [main]

permissions:
  contents: write # This tells GitHub the bot has permission to write files

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Gets the whole history so it doesn't freak out

      - name: Update JSON
        run: |
          # Get the last commit message and SHA
          MSG=$(git log -1 --pretty=%s)
          SHA=$(git rev-parse HEAD)
          echo "{\"message\": \"$MSG\", \"status\": \"success\", \"sha\": \"$SHA\"}" > status.json
          
      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add status.json
          git commit -m "update live status [skip ci]" || exit 0 # Don't error if nothing changed
          git push
