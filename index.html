<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixxella | Void</title>
    <style>
        :root {
            --glow: #bc13fe;
            --bg: #0a0212;
        }

        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Consolas', monospace; /* More "tech nerd" vibe */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Particles */
        #particles {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .card {
            background: rgba(15, 5, 25, 0.8);
            border: 2px solid var(--glow);
            border-radius: 12px;
            padding: 30px;
            width: 380px;
            text-align: center;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.3);
            position: relative;
        }

        h1 {
            font-size: 2.2rem;
            margin: 0;
            letter-spacing: 4px;
            text-shadow: 2px 2px 0px var(--glow);
        }

        /* THE IMAGE FIX */
        .img-container {
            width: 100%;
            height: 70px; /* Force the squish */
            margin: 20px 0;
            overflow: hidden;
            border: 1px solid var(--glow);
            background: #1a0b2e; /* Dark fallback background */
        }

        .stretched-god {
            width: 100%;
            height: 100%;
            object-fit: fill; /* The magic for stretching */
            display: block;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            background: transparent;
            border: 1px solid #444;
            color: #fff;
            padding: 12px;
            text-decoration: none;
            transition: 0.2s;
            font-weight: bold;
        }

            .btn:hover {
                border-color: var(--glow);
                background: rgba(188, 19, 254, 0.1);
                box-shadow: inset 0 0 10px var(--glow);
            }

        .status {
            font-size: 0.8rem;
            color: var(--glow);
            margin-bottom: 20px;
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="particles"></canvas>

    <div class="card">
        <h1>VERNER</h1>
        <span class="status">SYSTEM_ACTIVE // STREAMING</span>

        <div class="img-container">
            <img src="https://www.roblox.com/headshot-thumbnail/image?userId=5252491078&width=420&height=420&format=png"
                 class="stretched-god"
                 onerror="this.src='https://via.placeholder.com/400x100/1a0b2e/bc13fe?text=IMAGE+LOADING...'">
        </div>

        <div class="links">
            <a href="https://www.roblox.com/users/5252491078/profile" class="btn">ROBLOX</a>
            <a href="https://twitch.tv/Verner_Ww" class="btn">TWITCH</a>
            <a href="#" class="btn">DISCORD</a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];

        class Particle {
        constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2;
        this.speedY = Math.random() * 0.5 + 0.2;
        }
        update() {
        this.y -= this.speedY;
        if (this.y < 0) this.y = canvas.height;
        }
        draw() {
        ctx.fillStyle = '#bc13fe';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        }
        }

        function init() {
        for (let i = 0; i < 60; i++) particles.push(new Particle());
        }

        function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
        }
        init(); animate();
    </script>
</body>
</html>
