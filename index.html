<!DOCTYPE html>

        body {
            /* Fixed background so the card actually pops */
            background: #0d0d0d;
            color: #eeeeee;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            /* Made the stuff bigger */
            border: 3px solid #a349a4;
            padding: 40px;
            width: 450px; /* Wider card */
            background: #1a1a1a; /* Darker card background */

        h1 {
            font-size: 2rem; /* Bigger title */
            margin: 0 0 20px 0;
            color: #ffa2fd;

            height: 80px; /* Bigger stretched image */

        }

        img {
            width: 100%;
            height: 100%;
            object-fit: fill;
            display: block;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

            color: #fff;
            text-decoration: none;
            border: 2px solid #333;
            padding: 15px;

        }

            a:hover {
                background: #a349a4;
                border-color: #ffa2fd;
                transform: translate(-3px, -3px);
                box-shadow: 5px 5px 0px #5a2d82;
            }

        .footer {
            margin-top: 25px;
            font-size: 0.8rem;
